<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Second Brain</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- JetBrains Mono Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">

    <!-- Fuse.js (Search Engine) -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <!-- KaTeX (Math Rendering) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Vis Network (Graph Visualization) -->
    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <!-- CRT Overlay -->
    <div class="crt-overlay"></div>
    <!-- Global Header -->
    <header class="global-header">
        <div class="brand mobile-brand" id="headerBrand">
            <i class="fas fa-layer-group" style="color: var(--text-accent)"></i>
            Second Brain
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleSearch()" aria-label="Search" data-tooltip="Search Docs (Ctrl+K)"
                data-tooltip-pos="bottom">
                <i class="fas fa-search"></i>
            </button>
            <button class="header-btn" onclick="toggleGraphView()" aria-label="Graph View" data-tooltip="View Network Graph"
                data-tooltip-pos="bottom">
                <i class="fas fa-project-diagram"></i>
            </button>
            <button class="theme-toggle header-btn" id="themeToggle" type="button" aria-label="Toggle dark mode"
                data-tooltip="Toggle Mode" data-tooltip-pos="bottom">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
        </div>
    </header>

    <!-- Global Search Overlay -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-modal">
            <div class="mobile-search-bar">
                <div class="search-wrapper" style="flex:1;">
                    <i class="fas fa-search search-icon" style="z-index: 2;"></i>
                    <input type="text" class="search-input" id="mobileSearchInput" placeholder="Search docs..."
                        onkeyup="handleMobileSearch(this.value)" />
                    <kbd class="shortcut-badge">Esc</kbd>
                </div>
                <button class="close-search-btn" onclick="toggleSearch()">Cancel</button>
            </div>
            <div class="mobile-search-results" id="mobileSearchResults">
                <div class="empty-state">
                    <i class="fas fa-search empty-state-icon"></i>
                    <div class="empty-state-title">Search Second Brain</div>
                    <div class="empty-state-desc">Find notes, definitions, and concepts instantly. Press 'Ctrl+K' anywhere to focus.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stack Navigation Bar -->
    <div class="stack-nav-bar" id="stackNavBar">
        <!-- Stack items rendered here by JS -->
    </div>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContentArea">
        <div id="breadcrumbs" class="breadcrumbs"></div>
        <div id="graphContainer">
            <button class="graph-close-overlay" onclick="toggleGraphView()">
                <i class="fas fa-times"></i> Close Graph
            </button>
            <div id="graphLegend" class="graph-legend"></div>
        </div>

        <!-- Stacked Notes Scrolling Container -->
        <div id="noteColumnsScrolling" class="note-columns-scrolling">
            <div id="noteColumnsContainer" class="note-columns-container">
                <!-- Stacked note columns rendered here by JS -->
            </div>
        </div>

        <!-- Default content display (shown when not in stacked mode) -->
        <div id="contentDisplay" class="markdown-body">
            <!-- Content rendered here -->
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
